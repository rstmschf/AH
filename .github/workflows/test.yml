name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ah_db
          POSTGRES_USER: ah_user
          POSTGRES_PASSWORD: ah_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ah_user -d ah_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-not-real
          DEBUG: "True"
          DB_NAME: ah_db
          DB_USER: ah_user
          DB_PASSWORD: ah_pass
          DB_HOST: localhost
          DB_PORT: 5432
          ALLOWED_HOSTS: localhost,127.0.0.1
          REDIS_URL: redis://localhost:6379/0
          CORS_ALLOWED_ORIGINS: http://localhost
        run: pytest